syntax = "proto3";

package admin;

option go_package = "vasset/admin-service/proto;pb";

service AdminService {
  rpc Login(AdminLoginRequest) returns (AdminLoginResponse);
  rpc Logout(AdminLogoutRequest) returns (AdminOperationResponse);
  rpc GetCurrentUser(AdminSessionRequest) returns (AdminCurrentUserResponse);

  rpc GetOverview(AdminEmpty) returns (AdminOverviewResponse);
  rpc GetRequestTrend(AdminRequestTrendRequest) returns (AdminRequestTrendResponse);
  rpc GetUserStats(AdminEmpty) returns (AdminUserStatsResponse);

  rpc GetProxySourceStatus(AdminEmpty) returns (AdminProxySourceStatusResponse);
  rpc GetProxySourcePolicy(AdminEmpty) returns (AdminProxySourcePolicyResponse);
  rpc UpdateProxySourcePolicy(AdminUpdateProxySourcePolicyRequest) returns (AdminOperationResponse);
  rpc ListProxies(AdminListProxiesRequest) returns (AdminListProxiesResponse);
  rpc CreateProxy(AdminCreateProxyRequest) returns (AdminCreateResourceResponse);
  rpc UpdateProxy(AdminUpdateProxyRequest) returns (AdminOperationResponse);
  rpc UpdateProxyStatus(AdminUpdateProxyStatusRequest) returns (AdminOperationResponse);
  rpc DeleteProxy(AdminDeleteRequest) returns (AdminOperationResponse);

  rpc ListCookies(AdminListCookiesRequest) returns (AdminListCookiesResponse);
  rpc GetCookie(AdminGetCookieRequest) returns (AdminGetCookieResponse);
  rpc CreateCookie(AdminCreateCookieRequest) returns (AdminCreateResourceResponse);
  rpc UpdateCookie(AdminUpdateCookieRequest) returns (AdminOperationResponse);
  rpc DeleteCookie(AdminDeleteRequest) returns (AdminOperationResponse);
  rpc FreezeCookie(AdminFreezeCookieRequest) returns (AdminFreezeCookieResponse);

  rpc ListBillingAccounts(AdminListBillingAccountsRequest) returns (AdminListBillingAccountsResponse);
  rpc GetBillingAccountDetail(AdminGetBillingAccountDetailRequest) returns (AdminGetBillingAccountDetailResponse);
  rpc AdjustBillingBalance(AdminAdjustBillingBalanceRequest) returns (AdminAdjustBillingBalanceResponse);
  rpc ListBillingShortfalls(AdminListBillingShortfallsRequest) returns (AdminListBillingShortfallsResponse);
  rpc ReconcileBillingShortfall(AdminReconcileBillingShortfallRequest) returns (AdminReconcileBillingShortfallResponse);
  rpc ListBillingLedger(AdminListBillingLedgerRequest) returns (AdminListBillingLedgerResponse);
  rpc ListBillingUsageRecords(AdminListBillingUsageRecordsRequest) returns (AdminListBillingUsageRecordsResponse);
  rpc GetBillingPricing(AdminEmpty) returns (AdminBillingPricingResponse);
  rpc UpdateBillingPricing(AdminUpdateBillingPricingRequest) returns (AdminBillingPricingResponse);
}

message AdminEmpty {}

message AdminUser {
  string user_id = 1;
  string email = 2;
  string nickname = 3;
  string avatar_url = 4;
  int32 role = 5;
  string created_at = 6;
}

message AdminLoginRequest {
  string email = 1;
  string password = 2;
  string user_agent = 3;
  string ip_address = 4;
}

message AdminLoginResponse {
  string session_id = 1;
  AdminUser user = 2;
}

message AdminLogoutRequest {
  string session_id = 1;
}

message AdminSessionRequest {
  string session_id = 1;
}

message AdminCurrentUserResponse {
  AdminUser user = 1;
}

message AdminOverviewResponse {
  int64 total_users = 1;
  int64 daily_active_users = 2;
  int64 weekly_active_users = 3;
  int64 total_downloads = 4;
  int64 downloads_today = 5;
  int64 success_downloads = 6;
  int64 failed_downloads = 7;
  int64 active_manual_proxies = 8;
  int64 total_manual_proxies = 9;
}

message AdminTrendPoint {
  string label = 1;
  int64 count = 2;
}

message AdminRequestTrendRequest {
  string granularity = 1;
  int32 limit = 2;
}

message AdminRequestTrendResponse {
  string granularity = 1;
  repeated AdminTrendPoint points = 2;
}

message AdminUserStatsResponse {
  int64 total_users = 1;
  int64 daily_active_users = 2;
  int64 weekly_active_users = 3;
}

message AdminProxySourceStatusResponse {
  bool healthy = 1;
  string mode = 2;
  string message = 3;
  string proxy_url = 4;
  string proxy_lease_id = 5;
  string proxy_expire_at = 6;
  string checked_at = 7;
}

message AdminProxySourcePolicyResponse {
  int64 id = 1;
  string scope_type = 2;
  string scope_value = 3;
  string primary_source = 4;
  string fallback_source = 5;
  bool fallback_enabled = 6;
  int32 dynamic_timeout_ms = 7;
  int32 dynamic_retry_count = 8;
  int32 dynamic_circuit_breaker_sec = 9;
  int32 min_lease_ttl_sec = 10;
  string manual_selection_strategy = 11;
}

message AdminUpdateProxySourcePolicyRequest {
  int64 id = 1;
  string primary_source = 2;
  string fallback_source = 3;
  bool fallback_enabled = 4;
  int32 dynamic_timeout_ms = 5;
  int32 dynamic_retry_count = 6;
  int32 dynamic_circuit_breaker_sec = 7;
  int32 min_lease_ttl_sec = 8;
  string manual_selection_strategy = 9;
}

message AdminProxyInfo {
  int64 id = 1;
  string host = 2;
  int32 port = 3;
  string protocol = 4;
  string username = 5;
  string region = 6;
  int32 priority = 7;
  string platform_tags = 8;
  string remark = 9;
  int32 status = 10;
  string last_used_at = 11;
  int32 success_count = 12;
  int32 fail_count = 13;
  string created_at = 14;
  string updated_at = 15;
}

message AdminListProxiesRequest {
  string search = 1;
  string protocol = 2;
  string region = 3;
  int32 status = 4;
  bool has_status = 5;
}

message AdminListProxiesResponse {
  repeated AdminProxyInfo items = 1;
}

message AdminCreateProxyRequest {
  string host = 1;
  int32 port = 2;
  string protocol = 3;
  string username = 4;
  string password = 5;
  string region = 6;
  int32 priority = 7;
  string platform_tags = 8;
  string remark = 9;
  int32 status = 10;
}

message AdminUpdateProxyRequest {
  int64 id = 1;
  string host = 2;
  int32 port = 3;
  string protocol = 4;
  string username = 5;
  string password = 6;
  string region = 7;
  int32 priority = 8;
  string platform_tags = 9;
  string remark = 10;
}

message AdminUpdateProxyStatusRequest {
  int64 id = 1;
  int32 status = 2;
}

message AdminDeleteRequest {
  int64 id = 1;
}

message AdminCookieInfo {
  int64 id = 1;
  string platform = 2;
  string name = 3;
  string content = 4;
  int32 status = 5;
  string expire_at = 6;
  string frozen_until = 7;
  int32 freeze_seconds = 8;
  string last_used_at = 9;
  int64 use_count = 10;
  int64 success_count = 11;
  int64 fail_count = 12;
  string created_at = 13;
  string updated_at = 14;
}

message AdminListCookiesRequest {
  string platform = 1;
  int32 status = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message AdminListCookiesResponse {
  int64 total = 1;
  int32 page = 2;
  int32 page_size = 3;
  repeated AdminCookieInfo items = 4;
}

message AdminGetCookieRequest {
  int64 id = 1;
}

message AdminGetCookieResponse {
  AdminCookieInfo cookie = 1;
}

message AdminCreateCookieRequest {
  string platform = 1;
  string name = 2;
  string content = 3;
  string expire_at = 4;
  int32 freeze_seconds = 5;
}

message AdminUpdateCookieRequest {
  int64 id = 1;
  string name = 2;
  string content = 3;
  string expire_at = 4;
  int32 freeze_seconds = 5;
}

message AdminFreezeCookieRequest {
  int64 id = 1;
  int32 freeze_seconds = 2;
}

message AdminFreezeCookieResponse {
  bool success = 1;
  string frozen_until = 2;
}

message AdminCreateResourceResponse {
  int64 id = 1;
}

message AdminOperationResponse {
  bool success = 1;
}

message AdminBillingAccount {
  string user_id = 1;
  string email = 2;
  string nickname = 3;
  string available_balance_fen = 4;
  string reserved_balance_fen = 5;
  string total_recharged_fen = 6;
  string total_spent_fen = 7;
  int64 total_traffic_bytes = 8;
  int32 status = 9;
  int32 version = 10;
  string updated_at = 11;
}

message AdminListBillingAccountsRequest {
  string query = 1;
  int32 page = 2;
  int32 page_size = 3;
  int32 status = 4;
}

message AdminListBillingAccountsResponse {
  int64 total = 1;
  int32 page = 2;
  int32 page_size = 3;
  repeated AdminBillingAccount items = 4;
}

message AdminGetBillingAccountDetailRequest {
  string user_id = 1;
}

message AdminGetBillingAccountDetailResponse {
  AdminBillingAccount account = 1;
}

message AdminAdjustBillingBalanceRequest {
  string user_id = 1;
  string operation_id = 2;
  string amount_fen = 3;
  string remark = 4;
  string operator_user_id = 5;
}

message AdminAdjustBillingBalanceResponse {
  bool success = 1;
  AdminBillingAccount account = 2;
  string entry_no = 3;
}

message AdminBillingShortfallOrder {
  string order_no = 1;
  string user_id = 2;
  string email = 3;
  string nickname = 4;
  int64 history_id = 5;
  string task_id = 6;
  int32 scene = 7;
  int32 status = 8;
  int32 pricing_version = 9;
  int64 actual_ingress_bytes = 10;
  int64 actual_egress_bytes = 11;
  int64 actual_traffic_bytes = 12;
  string held_amount_fen = 13;
  string captured_amount_fen = 14;
  string released_amount_fen = 15;
  string shortfall_fen = 16;
  string remark = 17;
  string created_at = 18;
  string updated_at = 19;
}

message AdminListBillingShortfallsRequest {
  string user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message AdminListBillingShortfallsResponse {
  int64 total = 1;
  int32 page = 2;
  int32 page_size = 3;
  repeated AdminBillingShortfallOrder items = 4;
}

message AdminReconcileBillingShortfallRequest {
  string order_no = 1;
  string operator_user_id = 2;
  string remark = 3;
}

message AdminReconcileBillingShortfallResponse {
  bool success = 1;
  AdminBillingShortfallOrder order = 2;
  AdminBillingAccount account = 3;
  string entry_no = 4;
}

message AdminBillingLedgerEntry {
  string entry_no = 1;
  string user_id = 2;
  string email = 3;
  string nickname = 4;
  string order_no = 5;
  string hold_no = 6;
  int64 history_id = 7;
  string task_id = 8;
  string transfer_id = 9;
  string operation_id = 10;
  int32 entry_type = 11;
  int32 scene = 12;
  string action_amount_fen = 13;
  string available_delta_fen = 14;
  string reserved_delta_fen = 15;
  string balance_after_available_fen = 16;
  string balance_after_reserved_fen = 17;
  string operator_user_id = 18;
  string remark = 19;
  string created_at = 20;
}

message AdminListBillingLedgerRequest {
  string user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
  int32 entry_type = 4;
}

message AdminListBillingLedgerResponse {
  int64 total = 1;
  int32 page = 2;
  int32 page_size = 3;
  repeated AdminBillingLedgerEntry items = 4;
}

message AdminBillingUsageRecord {
  string usage_no = 1;
  string order_no = 2;
  string user_id = 3;
  string email = 4;
  string nickname = 5;
  int64 history_id = 6;
  string task_id = 7;
  string transfer_id = 8;
  int32 direction = 9;
  int64 traffic_bytes = 10;
  string unit_price_fen_per_gib = 11;
  string amount_fen = 12;
  int32 pricing_version = 13;
  string source_service = 14;
  int32 status = 15;
  string created_at = 16;
  string confirmed_at = 17;
}

message AdminListBillingUsageRecordsRequest {
  string user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
  int32 direction = 4;
}

message AdminListBillingUsageRecordsResponse {
  int64 total = 1;
  int32 page = 2;
  int32 page_size = 3;
  repeated AdminBillingUsageRecord items = 4;
}

message AdminBillingPricingResponse {
  int32 version = 1;
  string ingress_price_fen_per_gib = 2;
  string egress_price_fen_per_gib = 3;
  bool enabled = 4;
  string remark = 5;
  string updated_by_user_id = 6;
  string effective_at = 7;
  string created_at = 8;
}

message AdminUpdateBillingPricingRequest {
  string ingress_price_fen_per_gib = 1;
  string egress_price_fen_per_gib = 2;
  string remark = 3;
  string operator_user_id = 4;
}
