syntax = "proto3";

package auth;

option go_package = "vasset/admin-service/proto;pb";

service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc GetPlatformUserStats(GetPlatformUserStatsRequest) returns (GetPlatformUserStatsResponse);
}

message LoginRequest {
  string email = 1;
  string password = 2;
  string device_info = 3;
  string ip_address = 4;
}

message LoginResponse {
  string token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;
  User user = 4;
}

message GetPlatformUserStatsRequest {}

message GetPlatformUserStatsResponse {
  int64 total_users = 1;
}

message User {
  string user_id = 1;
  string email = 2;
  string nickname = 3;
  string avatar_url = 4;
  int32 role = 5;
  string created_at = 6;
}

