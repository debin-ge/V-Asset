server:
  port: 8081
  mode: debug
  read_timeout: 30s
  write_timeout: 30s
  max_header_bytes: 1048576

grpc:
  auth_service: localhost:9001
  asset_service: localhost:9004
  timeout: 5s

redis:
  addr: localhost:6379
  password: ""
  db: 1
  pool_size: 10

session:
  secret: admin-session-secret
  ttl: 24h
  cookie_name: vasset_admin_session
  secure: false
  cookie_domain: ""
  same_site: Lax

cors:
  allowed_origins:
    - http://localhost:3001
  allowed_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allowed_headers:
    - Content-Type
    - Authorization
  allow_credentials: true
