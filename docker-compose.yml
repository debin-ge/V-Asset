# ================================================
# V-Asset 后端服务统一 Docker Compose 配置
# 快速启动: docker-compose up -d
# ================================================

services:
  # ==================== 基础设施 ====================

  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: vasset-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-vasset}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-vasset}
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
    ports:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U vasset" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: vasset-redis
    ports:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==================== 微服务 ====================

  # Auth Service - 认证服务
  auth-service:
    build: ./auth-service
    container_name: vasset-auth
    ports:
      - "9001:9001"
    environment:
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-vasset}
      - DB_PASSWORD=password
      - DB_NAME=${DB_NAME:-vasset}
      - REDIS_ADDR=${REDIS_ADDR:-redis:6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Asset Service - 资产服务
  asset-service:
    build: ./asset-service
    container_name: vasset-asset
    ports:
      - "9004:9004"
    environment:
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-vasset}
      - DB_PASSWORD=password
      - DB_NAME=${DB_NAME:-vasset}
      - REDIS_ADDR=${REDIS_ADDR:-redis:6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    volumes:
      - vasset-data:/data/vasset
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    restart: unless-stopped

  # Proxy Service - 代理服务 (对接第三方 yt-dlp API)
  proxy-service:
    build: ./proxy-service
    container_name: vasset-proxy
    ports:
      - "9010:9010"
    environment:
      - REDIS_ADDR=${REDIS_ADDR:-redis:6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - YTDLP_API_BASE_URL=${YTDLP_API_BASE_URL:-https://yt-dlp-651719502982.us-west2.run.app}
      - YTDLP_API_KEY=${YTDLP_API_KEY:-your_secret_token_here}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # API Gateway - API 网关
  api-gateway:
    build: ./api-gateway
    container_name: vasset-gateway
    ports:
      - "8080:8080"
    environment:
      - AUTH_SERVICE_ADDR=${AUTH_SERVICE_ADDR:-auth-service:9001}
      - PROXY_SERVICE_ADDR=${PROXY_SERVICE_ADDR:-proxy-service:9010}
      - ASSET_SERVICE_ADDR=${ASSET_SERVICE_ADDR:-asset-service:9004}
      - REDIS_ADDR=${REDIS_ADDR:-redis:6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    volumes:
      - vasset-data:/data/vasset:ro # 只读挂载，用于提供文件下载
    depends_on:
      - auth-service
      - proxy-service
      - asset-service
    restart: unless-stopped

  # Frontend Service - 前端服务
  frontend-service:
    build:
      context: ./frontend-service
      args:
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    container_name: vasset-frontend
    ports:
      - "80:3000"
    depends_on:
      - api-gateway
    restart: unless-stopped

# ==================== 数据卷 ====================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  vasset-data:
    driver: local
  cookies-data:
    driver: local

# ==================== 网络 ====================
networks:
  default:
    name: vasset-network
