# ================================================
# V-Asset 后端服务统一 Docker Compose 配置
# 快速启动: docker-compose up -d
# ================================================

services:
  # ==================== 基础设施 ====================

  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: vasset-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-vasset}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-vasset}
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
    ports:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U vasset" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: vasset-redis
    ports:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # RabbitMQ 消息队列
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: vasset-rabbitmq
    ports:
      - "5672" # AMQP
      - "15672" # 管理界面
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ==================== 微服务 ====================

  # Auth Service - 认证服务
  auth-service:
    build: ./auth-service
    container_name: vasset-auth
    ports:
      - "9001:9001"
    environment:
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-vasset}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_NAME=${DB_NAME:-vasset}
      - REDIS_ADDR=${REDIS_ADDR:-redis:6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Media Service - 解析+下载融合服务
  media-service:
    build: ./media-service
    container_name: vasset-media
    ports:
      - "9002:9002"
    environment:
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-vasset}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_NAME=${DB_NAME:-vasset}
      - REDIS_ADDR=${REDIS_ADDR:-redis:6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      - ASSET_SERVICE_ADDR=${ASSET_SERVICE_ADDR:-asset-service:9004}
    volumes:
      - cookies-data:/etc/vasset/cookies
      - vasset-data:/data/vasset
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # Asset Service - 资产服务
  asset-service:
    build: ./asset-service
    container_name: vasset-asset
    ports:
      - "9004:9004"
    environment:
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-vasset}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_NAME=${DB_NAME:-vasset}
      - REDIS_ADDR=${REDIS_ADDR:-redis:6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - PROXY_API_ENDPOINT=${PROXY_API_ENDPOINT:-}
      - PROXY_API_KEY=${PROXY_API_KEY:-}
    volumes:
      - vasset-data:/data/vasset
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    restart: unless-stopped

  # API Gateway - API 网关
  api-gateway:
    build: ./api-gateway
    container_name: vasset-gateway
    ports:
      - "8080:8080"
    environment:
      - AUTH_SERVICE_ADDR=${AUTH_SERVICE_ADDR:-auth-service:9001}
      - MEDIA_SERVICE_ADDR=${MEDIA_SERVICE_ADDR:-media-service:9002}
      - ASSET_SERVICE_ADDR=${ASSET_SERVICE_ADDR:-asset-service:9004}
      - REDIS_ADDR=${REDIS_ADDR:-redis:6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
    volumes:
      - vasset-data:/data/vasset:ro # 只读挂载，用于提供文件下载
    depends_on:
      - auth-service
      - media-service
      - asset-service
    restart: unless-stopped

  # Admin Service - 管理后台后端
  admin-service:
    build: ./admin-service
    container_name: vasset-admin-service
    ports:
      - "8081:8081"
    environment:
      - AUTH_SERVICE_ADDR=${AUTH_SERVICE_ADDR:-auth-service:9001}
      - ASSET_SERVICE_ADDR=${ASSET_SERVICE_ADDR:-asset-service:9004}
      - REDIS_ADDR=${REDIS_ADDR:-redis:6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3001}
      - CORS_ALLOWED_HEADERS=${CORS_ALLOWED_HEADERS:-Content-Type,Authorization}
      - SESSION_SECURE=${SESSION_SECURE:-false}
    depends_on:
      - auth-service
      - asset-service
      - redis
    restart: unless-stopped

  # Frontend Service - 前端服务
  frontend-service:
    build:
      context: ./frontend-service
      args:
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
        - NEXT_PUBLIC_PARSE_TIMEOUT_MS=${NEXT_PUBLIC_PARSE_TIMEOUT_MS:-300000}
    container_name: vasset-frontend
    ports:
      - "80:3000"
    depends_on:
      - api-gateway
    restart: unless-stopped

  # Admin Frontend - 管理后台前端
  admin-frontend:
    build: ./admin-frontend
    container_name: vasset-admin-frontend
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_ADMIN_API_BASE_URL=${NEXT_PUBLIC_ADMIN_API_BASE_URL:-http://localhost:8081}
    depends_on:
      - admin-service
    restart: unless-stopped

# ==================== 数据卷 ====================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  rabbitmq-data:
    driver: local
  vasset-data:
    driver: local
  cookies-data:
    driver: local

# ==================== 网络 ====================
networks:
  default:
    name: vasset-network
