server:
  port: 8080
  mode: debug  # debug, release
  read_timeout: 600s  # 放宽：允许缓慢连接或长时间下载 (1小时)
  write_timeout: 600s # 放宽：必须极大允许长时间流式传输大文件
  max_header_bytes: 1048576  # 1MB

grpc:
  auth_service: "localhost:9001"
  media_service: "localhost:9002"
  asset_service: "localhost:9004"
  admin_service: "localhost:9005"
  timeout: 300s  # YouTube + 代理链路可能超过 90s，需明显放宽

admin_session:
  cookie_name: "youdlp_admin_session"
  ttl: 24h
  secure: false
  cookie_domain: ""
  same_site: "Lax"

redis:
  addr: "localhost:6379"
  password: ""
  db: 0
  pool_size: 100

rabbitmq:
  url: "amqp://guest:guest@localhost:5672/"
  exchange: "youdlp.download.exchange"
  queue: "youdlp.download.queue"
  routing_key: "download.quick"

cors:
  allowed_origins: []
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "Authorization"
    - "Content-Type"
    - "X-Request-ID"
  max_age: 86400

rate_limit:
  global_rps: 200
  user_rps: 10
  burst: 20

file_download:
  max_concurrent: 50
  buffer_size: 32768  # 32KB

billing:
  enabled: true

logging:
  level: debug
  format: json
